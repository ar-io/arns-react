name: PR Preview Deployment

on:
  workflow_dispatch:
    inputs:
      undername:
        description: "Undername to deploy to (e.g., 'preview' for preview.arns.app)"
        required: true
        type: string
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # Run for: workflow_dispatch OR (PR from same repo that isn't closed)
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'closed')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build
        env:
          # FOR BUILD
          VITE_NODE_ENV: production
          VITE_SENTRY_ENABLED: ${{ vars.VITE_SENTRY_ENABLED }}
          VITE_GITHUB_HASH: ${{ github.sha }}
          VITE_ARWEAVE_HOST: ${{ vars.ARWEAVE_HOST }}
          VITE_ARNS_SERVICE_API: ${{ vars.ARNS_SERVICE_API }}
          VITE_ARNS_REGISTRY_ADDRESS: ${{ vars.VITE_ARNS_REGISTRY_ADDRESS }}
          VITE_ARIO_PROCESS_ID: ${{ vars.VITE_ARIO_PROCESS_ID }}
          VITE_ARIO_AO_CU_URL: ${{ vars.VITE_ARIO_AO_CU_URL }}
          VITE_ANT_AO_CU_URL: ${{ vars.VITE_ANT_AO_CU_URL }}

      # Deploy PR preview (pull_request or workflow_dispatch without undername)
      - name: Deploy PR preview
        uses: permaweb/permaweb-deploy@v0.1.0
        with:
          deploy-key: ${{ secrets.DEPLOY_KEY }}
          arns-name: ${{ secrets.ARNS_NAME }}
          undername: "${{ github.event_name == 'pull_request' && '@' || inputs.undername }}"
          preview: ${{ github.event_name == 'pull_request' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-folder: ./dist
