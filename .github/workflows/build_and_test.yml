name: Build and Test

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches-ignore:
      - main
      - develop
  workflow_dispatch:
  workflow_call:

jobs:
  lint_test_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:check
      # - run: pnpm test
      - run: pnpm build

      # Upload build artifacts to avoid rebuilding in subsequent jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  test-playwright:
    runs-on: ubuntu-latest
    needs: lint_test_build
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v3
      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key:
            playwright-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-browsers-${{ runner.os }}-

      # Install Playwright browsers if not cached
      - run: pnpm playwright install

      # Download build artifacts instead of rebuilding
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - run: pnpm test:playwright
